<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agent Flow (Desktop)</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0b10;
      color: #e6e6e6;
      font-family: -apple-system, Segoe UI, sans-serif;
    }
    h1 { font-size: 1.25rem; font-weight: 500; opacity: 0.9; }
    p { opacity: 0.6; font-size: 0.9rem; }
    #log {
      margin-top: 1.5rem;
      max-width: 640px;
      max-height: 240px;
      overflow-y: auto;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
      background: #15151c;
      border-radius: 6px;
      padding: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Agent Flow — Desktop (Phase 1 scaffold)</h1>
  <p>Renderer build not found. This placeholder proves the IPC pipe works.</p>
  <div id="log"></div>
  <script>
    const log = document.getElementById('log')
    function append(label, data) {
      const line = document.createElement('div')
      line.textContent = `[${label}] ${JSON.stringify(data)}`
      log.appendChild(line)
      log.scrollTop = log.scrollHeight
    }
    if (window.electronBridge) {
      window.electronBridge.onStatus((data) => append('status', data))
      window.electronBridge.onEvent((data) => append('agent-event', data))
      window.electronBridge.onSessionLifecycle((data) => append('session-lifecycle', data))
    } else {
      append('error', 'window.electronBridge is undefined — preload did not run')
    }
  </script>
</body>
</html>
